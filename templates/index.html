<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Разделитель текстовых файлов</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --card: #ffffff;
      --border: #d2d2d7;
      --accent: #0071e3;
      --accent-hover: #0077ed;
      --text: #1d1d1f;
      --muted: #6e6e73;
      --danger-bg: #fef0f0;
      --danger-border: #f5c2c7;
      --danger-text: #842029;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 24px;
      line-height: 1.5;
    }
    .container {
      max-width: 640px;
      margin: 20px auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    h1 {
      font-size: 1.5rem;
      margin: 0 0 20px;
      font-weight: 600;
    }
    .field { margin-bottom: 18px; }
    label {
      display: block;
      font-weight: 500;
      margin-bottom: 6px;
      font-size: 0.95rem;
    }
    input[type="file"],
    input[type="text"],
    select {
      width: 100%;
      padding: 9px 11px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      background: var(--card);
      color: var(--text);
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,113,227,0.15);
    }
    .size-row { display: flex; gap: 8px; }
    .size-row input[type="text"] { flex: 1; }
    .size-row select { width: auto; }
    .radios { display: flex; flex-wrap: wrap; gap: 16px; }
    .radios label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 400;
      margin: 0;
      cursor: pointer;
    }
    button {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 10px 24px;
      font-size: 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.15s;
    }
    button:hover { background: var(--accent-hover); }
    button:disabled { background: var(--muted); cursor: not-allowed; }
    .separator-field { transition: opacity 0.15s; }
    .separator-field.disabled { opacity: 0.4; }
    .separator-field.disabled input { pointer-events: none; }
    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 20px 0;
    }
    .flash {
      padding: 11px 14px;
      border-radius: 8px;
      margin-bottom: 18px;
      font-size: 0.9rem;
    }
    .flash.error {
      background: var(--danger-bg);
      border: 1px solid var(--danger-border);
      color: var(--danger-text);
    }
    .status {
      margin-top: 16px;
      color: var(--muted);
      font-size: 0.9rem;
      min-height: 1.4em;
    }
    .hint { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Разделитель текстовых файлов</h1>

    {% if error %}
      <div class="flash error">{{ error }}</div>
    {% endif %}

    <form id="splitForm" action="/split" method="post" enctype="multipart/form-data">
      <div class="field">
        <label for="file">Исходный файл</label>
        <input type="file" name="file" id="file" accept=".txt,text/plain,*.*" required>
      </div>

      <div class="field">
        <label for="size_value">Предельный размер</label>
        <div class="size-row">
          <input type="text" name="size_value" id="size_value" value="1" inputmode="decimal" required>
          <select name="size_unit" id="size_unit">
            <option value="Б">Байт</option>
            <option value="КБ">КБ</option>
            <option value="МБ" selected>МБ</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label>Способ разделения</label>
        <div class="radios">
          <label><input type="radio" name="method" value="size"> Просто по размеру</label>
          <label><input type="radio" name="method" value="lines"> По переносу строки</label>
          <label><input type="radio" name="method" value="separator" checked> По набору символов</label>
        </div>
      </div>

      <div class="field separator-field" id="separatorField">
        <label for="separator">Разделитель</label>
        <input type="text" name="separator" id="separator" value="---">
        <div class="hint">Используется только в режиме «По набору символов».</div>
      </div>

      <hr>

      <button type="submit" id="submitBtn">Разделить</button>
      <div class="status" id="status"></div>
    </form>
  </div>

  <script>
    // Включение/выключение поля разделителя в зависимости от режима.
    const radios = document.querySelectorAll('input[name="method"]');
    const sepField = document.getElementById('separatorField');
    function updateSeparator() {
      const isSep = document.querySelector('input[name="method"]:checked').value === 'separator';
      sepField.classList.toggle('disabled', !isSep);
    }
    radios.forEach(r => r.addEventListener('change', updateSeparator));
    updateSeparator();

    // Индикация процесса: при отправке формы показываем статус и блокируем кнопку.
    // При успехе браузер скачивает zip и страница остаётся; при ошибке форма
    // перерисовывается сервером с кнопкой в нормальном состоянии.
    const form = document.getElementById('splitForm');
    const submitBtn = document.getElementById('submitBtn');
    const status = document.getElementById('status');
    form.addEventListener('submit', () => {
      submitBtn.disabled = true;
      submitBtn.textContent = 'Разделение…';
      status.textContent = 'Файл загружается и обрабатывается, подождите…';
    });
  </script>
</body>
</html>
